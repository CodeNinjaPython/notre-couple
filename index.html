<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#F6F5FF">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Notre cycle">
  <title>Notre cycle</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
  <!-- Applique le mode sombre avant le 1er rendu (évite le flash clair) -->
  <script>try{if(localStorage.getItem('nc-dark')==='1'){document.body.classList.add('dark');document.querySelector('meta[name="theme-color"]').setAttribute('content','#14131C');}}catch(e){}</script>

  <!-- Mount point -->
  <div id="view"></div>

  <!-- Bannière opt-in notifications (affichée une seule fois après connexion) -->
  <div id="notif-banner" class="notif-banner">
    <span>Recevoir des rappels quotidiens ?</span>
    <div>
      <button type="button" id="btn-notif-yes">Oui</button>
      <button type="button" id="btn-notif-no">Non merci</button>
    </div>
  </div>

  <!-- Quick Log Bar — barre de saisie rapide (initialisée par app.js après auth) -->

  <!-- Bottom navigation — 4 onglets : Aujourd'hui · Cycle · Intime · Analyse -->
  <nav id="main-nav" aria-label="Navigation principale">
    <button type="button" data-nav="today" class="on" aria-label="Aujourd'hui">
      <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
      Aujourd'hui
    </button>
    <button type="button" data-nav="calendar" aria-label="Cycle">
      <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="4" y="5" width="16" height="16" rx="2"/><path d="M4 10h16M9 3v4M15 3v4"/></svg>
      Cycle
    </button>
    <button type="button" data-nav="intime" aria-label="Intime">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      Intime
    </button>
    <button type="button" data-nav="nous" aria-label="Analyse">
      <svg viewBox="0 0 24 24" aria-hidden="true"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      Analyse
    </button>
  </nav>

  <!-- ================================================================
       TEMPLATE : ONBOARDING (4 étapes)
       ================================================================ -->
  <template id="tpl-onboarding">
    <div class="app onboard-app">

      <!-- Barre de progression : retour + points + libellé lecteur d'écran -->
      <div class="onboard-topbar">
        <button type="button" id="btn-onboard-back" class="onboard-back" aria-label="Étape précédente" style="visibility:hidden">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <div class="onboard-dots" role="progressbar" aria-label="Progression de la configuration"
             aria-valuemin="1" aria-valuemax="4" aria-valuenow="1">
          <span class="onboard-dot active"></span>
          <span class="onboard-dot"></span>
          <span class="onboard-dot"></span>
          <span class="onboard-dot"></span>
        </div>
        <span class="onboard-back" aria-hidden="true"></span>
      </div>
      <p id="onboard-progress-label" class="sr-only" aria-live="polite">Étape 1 sur 4</p>

      <!-- Étape 1 : Bienvenue -->
      <div class="onboard-step active" data-step="1">
        <div class="onboard-hero">🌸</div>
        <h1 class="onboard-title" tabindex="-1">Notre cycle</h1>
        <p class="onboard-desc">
          Suivez votre cycle ensemble, en couple.<br>
          Symétrique, privé, sans algorithmes.
        </p>
        <ul class="onboard-features">
          <li><span class="feat-icon" style="background:var(--elle-light);color:var(--elle)">📈</span>Double rythme synchronisé</li>
          <li><span class="feat-icon" style="background:var(--lui-light);color:var(--lui)">🔗</span>Données uniquement partagées entre vous</li>
          <li><span class="feat-icon" style="background:var(--violet-light);color:var(--violet)">🔒</span>Zéro partage avec des tiers</li>
        </ul>
        <button type="button" id="btn-onboard-1" class="btn-primary" style="margin-top:32px">Commencer →</button>
      </div>

      <!-- Étape 2 : Disclaimer -->
      <div class="onboard-step" data-step="2">
        <div class="onboard-hero" style="background:var(--red-light)">⚕️</div>
        <h1 class="onboard-title" tabindex="-1">Important</h1>
        <div class="disclaimer-box">
          <p>Cette application est un <strong>outil d'observation</strong>, pas un moyen de contraception.</p>
          <p style="margin-top:12px">Les prédictions sont indicatives et dépendent de la régularité de votre cycle. Consultez un professionnel de santé pour tout sujet médical.</p>
        </div>
        <label class="onboard-consent" for="onboard-consent">
          <input type="checkbox" id="onboard-consent">
          <span>J'ai compris : ces données de santé sont sensibles, restent privées à notre couple, et l'app ne remplace pas un avis médical.</span>
        </label>
        <button type="button" id="btn-onboard-2" class="btn-primary" style="margin-top:20px" disabled>J'ai compris et j'accepte</button>
      </div>

      <!-- Étape 3 : Mode du cycle -->
      <div class="onboard-step" data-step="3">
        <div class="onboard-hero">🎯</div>
        <h1 class="onboard-title" tabindex="-1">Votre objectif</h1>
        <p class="onboard-desc">Adaptez l'app à votre situation.</p>
        <div class="mode-choices" role="radiogroup" aria-label="Objectif du suivi">
          <button type="button" class="mode-choice active" data-mode="rules" aria-pressed="true">
            <span class="mode-icon">🌀</span>
            <div>
              <div class="mode-title">Comprendre nos rythmes</div>
              <div class="mode-sub">Suivi du cycle, insights, synchronie</div>
            </div>
          </button>
          <button type="button" class="mode-choice" data-mode="conception" aria-pressed="false">
            <span class="mode-icon">🌱</span>
            <div>
              <div class="mode-title">Préparer une grossesse</div>
              <div class="mode-sub">Fenêtre fertile mise en avant</div>
            </div>
          </button>
          <button type="button" class="mode-choice" data-mode="pregnancy" aria-pressed="false">
            <span class="mode-icon">🤰</span>
            <div>
              <div class="mode-title">Suivi de grossesse</div>
              <div class="mode-sub">Semaine par semaine, sans prédiction de règles</div>
            </div>
          </button>
        </div>
        <button type="button" id="btn-onboard-3" class="btn-primary" style="margin-top:24px">Continuer →</button>
      </div>

      <!-- Étape 4 : Date des dernières règles -->
      <div class="onboard-step" data-step="4">
        <div class="onboard-hero">📅</div>
        <h1 class="onboard-title" tabindex="-1">Dernières règles</h1>
        <p class="onboard-desc">
          Pour lancer le calcul de cycle. Vous pourrez modifier cette date plus tard.
        </p>
        <div class="field" style="margin-top:24px">
          <label for="onboard-period-date">Date de début</label>
          <input type="date" id="onboard-period-date">
        </div>
        <button type="button" id="btn-onboard-4" class="btn-primary" style="margin-top:8px">Terminer →</button>
        <button type="button" id="btn-onboard-4-skip" class="btn-secondary" style="margin-top:10px">Je n'ai pas mes règles / passer</button>
      </div>

    </div>
  </template>

  <!-- ================================================================
       TEMPLATE : AUTH
       ================================================================ -->
  <template id="tpl-auth">
    <div class="app">
      <header>
        <div class="eyebrow">Bienvenue</div>
        <div class="phase">Notre cycle</div>
        <div class="date" id="today-date"></div>
      </header>

      <div class="card" style="margin-top:32px">
        <h2>Connexion</h2>
        <div id="auth-form">
          <div id="auth-demo-hint" class="auth-demo-hint">
            Mode démo actif — aucun compte réel.<br>
            Entrez n'importe quoi et appuyez sur Entrée.
          </div>
          <p style="color:var(--muted);font-size:14px;margin-bottom:20px;line-height:1.6">
            Connecte-toi avec ton e-mail et un mot de passe.<br>
            <span style="color:var(--faint)">Premier accès : le compte se crée automatiquement.</span>
          </p>
          <div class="field">
            <label for="auth-email">Adresse e-mail</label>
            <input type="email" id="auth-email" autocomplete="email" placeholder="vous@exemple.com" inputmode="email">
          </div>
          <div class="field">
            <label for="auth-password">Mot de passe</label>
            <input type="password" id="auth-password" autocomplete="current-password"
              placeholder="••••••••" minlength="6">
          </div>
          <button id="auth-submit" class="btn-primary">Se connecter / Créer le compte</button>
        </div>
      </div>

      <p class="disclaimer">
        Application privée · usage personnel uniquement<br>
        Aucune donnée partagée avec des tiers
      </p>
    </div>
  </template>

  <!-- ================================================================
       TEMPLATE : PAIRING
       ================================================================ -->
  <template id="tpl-profile">
    <div class="app">
      <header>
        <div class="eyebrow">Première connexion</div>
        <div class="phase">Ton profil</div>
      </header>
      <div class="card" style="margin-top:24px">
        <h2>Qui es-tu&nbsp;?</h2>
        <p style="font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:18px">
          Quelques infos pour personnaliser ton espace.
        </p>
        <div class="field">
          <label for="profile-name">Ton prénom</label>
          <input type="text" id="profile-name" autocomplete="given-name" placeholder="ex. Juliette">
        </div>
        <div class="field">
          <label>Tu es&nbsp;?</label>
          <div class="who" id="profile-role" role="radiogroup" aria-label="Ton rôle">
            <button type="button" data-role="elle" aria-pressed="false">♀ Elle</button>
            <button type="button" data-role="lui" aria-pressed="false">♂ Lui</button>
          </div>
          <div class="toggle-sub" style="margin-top:6px">Elle = suivi de cycle complet · Lui = suivi bien-être. Vous voyez chacun les données de l'autre, mais ne modifiez que les vôtres.</div>
        </div>
        <button id="btn-profile-continue" class="btn-primary" style="margin-top:22px">Continuer →</button>
      </div>
      <p class="disclaimer">App privée pour votre couple. Données sensibles, jamais partagées hors de votre espace.</p>
    </div>
  </template>

  <template id="tpl-pairing">
    <div class="app">
      <header>
        <div class="eyebrow">Première connexion</div>
        <div class="phase">Notre espace</div>
      </header>

      <!-- Choix initial -->
      <div id="pairing-choice" style="margin-top:28px">
        <button id="btn-create" class="btn-choice">
          Créer notre espace
          <span class="sub">Je suis le premier à m'inscrire — je génère le code d'invitation.</span>
        </button>
        <button id="btn-join" class="btn-choice" style="margin-top:12px">
          Rejoindre avec un code
          <span class="sub">Mon partenaire m'a envoyé un code à 6 caractères.</span>
        </button>
      </div>

      <!-- Formulaire création -->
      <div id="pairing-create" style="display:none">
        <div class="card">
          <h2>Créer notre espace</h2>
          <div class="profile-recap" id="create-profile-recap"></div>
          <button id="btn-create-submit" class="btn-primary" style="margin-top:20px">Créer notre espace</button>
          <button id="btn-create-back" class="btn-secondary" style="margin-top:10px">Retour</button>
        </div>
      </div>

      <!-- Code généré à partager -->
      <div id="pairing-code-display" style="display:none">
        <div class="card">
          <h2>Code d'invitation</h2>
          <div class="code-display" id="generated-code">------</div>
          <div class="code-actions">
            <button type="button" id="btn-copy-code" class="btn-code-action">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
              Copier
            </button>
            <button type="button" id="btn-share-code" class="btn-code-action">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8M16 6l-4-4-4 4M12 2v13"/></svg>
              Partager
            </button>
          </div>
          <p style="font-size:13px;color:var(--muted);line-height:1.6;text-align:center;margin-bottom:16px">
            Expire dans 24 heures · Votre partenaire le saisit sur son téléphone.
          </p>
          <button type="button" id="btn-renew-code" class="btn-secondary">Nouveau code</button>
          <button type="button" id="btn-done" class="btn-primary" style="margin-top:10px">Continuer sans attendre →</button>
        </div>
        <p class="disclaimer">
          Une fois votre partenaire rejoint, l'espace se synchronise automatiquement.
        </p>
      </div>

      <!-- Formulaire rejoindre -->
      <div id="pairing-join" style="display:none">
        <div class="card">
          <h2>Rejoindre avec un code</h2>
          <div class="field">
            <label for="join-code">Code à 6 caractères</label>
            <input type="text" id="join-code" maxlength="6" autocomplete="off" placeholder="ex. AB3K7P"
              style="text-transform:uppercase;letter-spacing:.2em;font-family:'DM Mono',monospace;font-size:20px">
          </div>
          <div class="profile-recap" id="join-profile-recap"></div>
          <button id="btn-join-submit" class="btn-primary" style="margin-top:20px">Rejoindre</button>
          <button id="btn-join-back" class="btn-secondary" style="margin-top:10px">Retour</button>
        </div>
      </div>
    </div>
  </template>

  <!-- ================================================================
       TEMPLATE : TODAY (écran principal — maquette §6)
       ================================================================ -->
  <template id="tpl-today">
    <div class="app">

      <!-- En-tête -->
      <header>
        <button type="button" id="btn-profile" class="header-profile" aria-label="Réglages et profil">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="8" r="4"/><path d="M4 21v-1a6 6 0 0 1 6-6h4a6 6 0 0 1 6 6v1"/></svg>
        </button>
        <div class="eyebrow" id="eyebrow">—</div>
        <div class="phase" id="phase-name">Notre cycle</div>
        <div class="date" id="today-date"></div>
        <span class="demo-badge">Mode démo · données locales</span>
        <span id="streak-badge" class="streak-badge" style="display:none"></span>
      </header>

      <!-- ① Anneau de cycle SVG (pièce maîtresse) -->
      <div class="ring-wrap">
        <div id="cycle-ring" aria-live="polite"></div>
        <div id="ring-legend"></div>
      </div>

      <!-- Alerte : un besoin signalé par le partenaire (visible en grand pour le destinataire) -->
      <div id="partner-need-alert" class="partner-need-alert" style="display:none" role="alert" aria-live="assertive"></div>

      <!-- Météo-mémo : état d'elle pour le partenaire (#5) -->
      <div id="meteo-memo" class="card meteo-memo" style="display:none" aria-live="polite"></div>

      <!-- SOS réconfort : signaler un besoin en 1 tap (#6) -->
      <div id="sos-card" class="card sos-card" style="display:none">
        <div class="sos-label">Signaler un besoin</div>
        <div class="sos-btns">
          <button type="button" class="sos-btn" data-need="reconfort">
            <svg class="ctl-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
            Douceur
          </button>
          <button type="button" class="sos-btn" data-need="presence">
            <svg class="ctl-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            Présence
          </button>
          <button type="button" class="sos-btn" data-need="espace">
            <svg class="ctl-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M9.59 4.59A2 2 0 1 1 11 8H2m10.59 11.41A2 2 0 1 0 14 16H2m15.73-8.27A2.5 2.5 0 1 1 19.5 12H2"/></svg>
            Espace
          </button>
        </div>
      </div>

      <!-- Repère de grossesse (mode pregnancy uniquement) -->
      <div id="preg-milestone" class="card preg-milestone" style="display:none" aria-live="polite"></div>

      <!-- Suivi en solo : invitation à relier le partenaire (si pas encore lié) -->
      <div id="solo-banner" class="card solo-banner" style="display:none">
        <div class="solo-banner-text">
          <strong>Vous suivez en solo pour l'instant.</strong>
          <span>Reliez votre partenaire pour révéler vos corrélations et votre double rythme.</span>
        </div>
        <button type="button" id="btn-invite-partner" class="btn-primary">Inviter mon partenaire</button>
      </div>

      <!-- Contrôle cycle (uniquement pour elle) -->
      <div id="cycle-controls" style="margin-top:12px;display:none">
        <button type="button" id="btn-cycle-toggle" class="btn-primary">Mes règles commencent</button>
      </div>

      <!-- Qui saisit ? + Comme hier -->
      <div class="who-row">
        <div class="who" id="who-toggle" role="tablist">
          <button type="button" data-p="elle">Elle</button>
          <button type="button" data-p="lui">Lui</button>
        </div>
        <button type="button" id="btn-comme-hier" class="btn-comme-hier" title="Copier la saisie d'hier">
          <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
          Comme hier
        </button>
      </div>

      <!-- ① Saisie du jour — action principale, remontée au-dessus du graphe -->
      <div class="card card-primary">
        <div class="log-date-nav">
          <button type="button" id="btn-log-prev" class="log-nav-btn" aria-label="Jour précédent">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><path d="M15 18l-6-6 6-6"/></svg>
          </button>
          <span id="log-date-label" class="log-date-label">Aujourd'hui</span>
          <button type="button" id="btn-log-next" class="log-nav-btn" aria-label="Jour suivant" disabled>
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><path d="M9 18l6-6-6-6"/></svg>
          </button>
        </div>
        <h2 id="log-title">Elle</h2>
        <div id="metrics">
          <div class="empty-state-inline">
            <div class="es-icon">✏️</div>
            <p>Chargement…</p>
          </div>
        </div>
      </div>

      <!-- ② Double rythme (sous la saisie) -->
      <div class="card rhythm">
        <h2>Notre rythme · ce cycle</h2>
        <svg id="chart" viewBox="0 0 340 148" preserveAspectRatio="none"
          aria-label="Courbes superposées des deux partenaires sur le cycle"></svg>
        <div class="legend">
          <span><i class="dot g"></i>Elle</span>
          <span><i class="dot s"></i>Lui</span>
        </div>
      </div>

      <!-- ③ Insight + Conseil lui (collapsible, ouvert par défaut) -->
      <div class="card collapsible-section" data-default-open="true">
        <button type="button" class="collapsible-header" aria-expanded="true">
          <h2>Cette semaine</h2>
          <svg class="collapsible-chevron" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><path d="M6 9l6 6 6-6"/></svg>
        </button>
        <div class="collapsible-body">
          <div class="insight" style="border-radius:14px;padding:16px">
            <div class="body" id="insight-body"></div>
            <div class="meta" id="insight-meta">Données en cours d'accumulation</div>
          </div>
          <div class="tip" id="tip-card" style="display:none;margin-top:12px;border-radius:14px;padding:16px">
            <h2>Pour toi</h2>
            <p id="tip-text"></p>
          </div>
        </div>
      </div>

      <!-- ③bis Conseils de phase (bien-être holistique, collapsible) -->
      <div class="card collapsible-section" id="coaching-card" style="display:none" data-default-open="false">
        <button type="button" class="collapsible-header" aria-expanded="false">
          <h2>Conseils du jour</h2>
          <svg class="collapsible-chevron" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><path d="M6 9l6 6 6-6"/></svg>
        </button>
        <div class="collapsible-body">
          <div id="coaching-body"></div>
        </div>
      </div>

      <!-- ④ Prédiction (collapsible, ouverte si dispo) -->
      <div class="card card-soft collapsible-section" id="prediction-card" style="display:none" data-default-open="true">
        <button type="button" class="collapsible-header" aria-expanded="true">
          <h2>Prochainement</h2>
          <svg class="collapsible-chevron" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><path d="M6 9l6 6 6-6"/></svg>
        </button>
        <div class="collapsible-body">
          <div class="pred-row">
            <div class="pred-item">
              <div class="pred-label">Règles</div>
              <div class="pred-val" style="color:var(--rose)" id="pred-next">—</div>
              <div class="pred-sub" id="pred-next-date"></div>
            </div>
            <div class="pred-item">

        <h3 class="sheet-title">⚡ Note rapide</h3>
        <p style="font-size:13px;color:var(--muted);margin-bottom:16px">4 taps · enregistrement immédiat.</p>

        <div class="field">
          <label>Ambiance</label>
          <div class="mood-grid">
            <button type="button" class="ft-mood-btn mood-btn" data-mood="tender" aria-label="Tendre">🥰<span>Tendre</span></button>
            <button type="button" class="ft-mood-btn mood-btn" data-mood="playful" aria-label="Joueur">😄<span>Joueur</span></button>
            <button type="button" class="ft-mood-btn mood-btn" data-mood="passionate" aria-label="Passionné">🔥<span>Passionné</span></button>
            <button type="button" class="ft-mood-btn mood-btn" data-mood="spontaneous" aria-label="Spontané">⚡<span>Spontané</span></button>
          </div>
        </div>

        <div class="field">
          <label>Ma satisfaction</label>
          <div class="ft-sat-grid" role="group" aria-label="Satisfaction">
            <button type="button" class="ft-sat-btn" data-sat="3" aria-label="Moyen">😔</button>
            <button type="button" class="ft-sat-btn" data-sat="5" aria-label="Bien">🙂</button>
            <button type="button" class="ft-sat-btn" data-sat="7" aria-label="Très bien">😊</button>
            <button type="button" class="ft-sat-btn" data-sat="9" aria-label="Excellent">🤩</button>
          </div>
        </div>

        <div class="toggle-row">
          <div><div class="toggle-label" id="ft-orgasm-label">Orgasme ?</div></div>
          <label class="toggle" aria-labelledby="ft-orgasm-label">
            <input type="checkbox" id="ft-orgasm">
            <span class="toggle-track"></span>
          </label>
        </div>

        <button type="button" id="btn-ft-save" class="btn-primary" style="margin-top:16px">Valider</button>
        <button type="button" id="btn-ft-cancel" class="btn-secondary" style="margin-top:8px">Annuler</button>
      </div>
    </div>

    <!-- Sheet : feedback post-séance (4 questions ~30s) -->
    <div id="feedback-sheet" class="sheet-backdrop">
      <div class="sheet">
        <div class="sheet-handle"></div>
        <h3 class="sheet-title">Note ta séance 🔥</h3>
        <p style="font-size:13px;color:var(--muted);margin-bottom:18px">Privé par défaut. ~30 secondes.</p>

        <div class="field">
          <label>Ma satisfaction</label>
          <div class="fb-sat-grid">
            <button type="button" class="fb-sat-btn" data-sat="2">😔</button>
            <button type="button" class="fb-sat-btn" data-sat="4">😐</button>
            <button type="button" class="fb-sat-btn" data-sat="6">🙂</button>
            <button type="button" class="fb-sat-btn" data-sat="8">😊</button>
            <button type="button" class="fb-sat-btn" data-sat="10">🤩</button>
          </div>
        </div>

        <div class="toggle-row">
          <div><div class="toggle-label">Orgasme ?</div></div>
          <label class="toggle">
            <input type="checkbox" id="fb-orgasm">
            <span class="toggle-track"></span>
          </label>
        </div>

        <div class="field" style="margin-top:14px">
          <label for="fb-loved">Ce que j'ai aimé</label>
          <div style="display:flex;gap:8px;align-items:center">
            <input type="text" id="fb-loved" placeholder="La tendresse, le rythme…" style="flex:1">
            <button type="button" id="btn-voice-feedback" class="voice-btn"
              aria-label="Dicter le feedback" title="Reconnaissance vocale">🎙️</button>
          </div>
        </div>

        <div class="field">
          <label for="fb-improve">Ce qu'on pourrait améliorer</label>
          <input type="text" id="fb-improve" placeholder="Plus de temps, plus de...">
        </div>

        <button type="button" id="btn-feedback-save" class="btn-primary">Enregistrer</button>
        <button type="button" id="btn-feedback-skip" class="btn-secondary" style="margin-top:10px">Passer</button>
      </div>
    </div>

    <!-- Sheet : détails position -->
    <div id="position-detail-sheet" class="sheet-backdrop" aria-hidden="true">
      <div class="sheet">
        <button type="button" class="sheet-close" id="btn-close-pos-detail" aria-label="Fermer">✕</button>
        <div class="sheet-handle"></div>
        <div class="pos-detail-nav">
          <button type="button" id="btn-pos-prev" class="pos-nav-btn" aria-label="Position précédente">‹</button>
          <span id="pos-detail-counter" class="pos-detail-counter"></span>
          <button type="button" id="btn-pos-next" class="pos-nav-btn" aria-label="Position suivante">›</button>
        </div>
        <div id="pos-detail-content"></div>
        <div class="sheet-actions" style="margin-top:20px; display:flex; flex-direction:column; gap:8px;">
          <button type="button" id="btn-toggle-pos-log" class="btn-primary" style="width:100%">Noter pour aujourd'hui</button>
          <button type="button" id="btn-close-pos-sheet" class="btn-secondary" style="width:100%">Fermer</button>
        </div>
      </div>
    </div>

    <!-- Overlay : vue Année défilante -->
    <div id="intime-year-overlay" class="sheet-backdrop" aria-hidden="true" style="z-index: 100;">
      <div class="sheet" style="max-height: 95vh; display: flex; flex-direction: column;">
        <button type="button" class="sheet-close" id="btn-close-intime-year" aria-label="Fermer">✕</button>
        <div class="sheet-handle"></div>
        <h3 class="sheet-title" style="text-align: center;">Aperçu de l'année (Intime)</h3>
        
        <!-- Année de navigation -->
        <div class="cal-nav" style="margin-bottom:15px; justify-content: center; gap: 20px;">
          <button id="intime-yr-prev" class="cal-nav-btn" aria-label="Année précédente"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M15 18l-6-6 6-6"/></svg></button>
          <span id="intime-yr-title" style="font-family:'DM Mono',monospace;font-size:16px;font-weight:700;letter-spacing:.1em"></span>
          <button id="intime-yr-next" class="cal-nav-btn" aria-label="Année suivante"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M9 18l6-6-6-6"/></svg></button>
        </div>

        <!-- Légende annuelle -->
        <div class="cal-legend" style="margin-bottom:15px; justify-content: center;">
          <span><i class="cal-legend-dot" style="background:#D9B36A"></i>Rapports</span>
        </div>

        <!-- Conteneur défilant verticalement pour les 12 mois -->
        <div id="intime-year-months-list" style="flex: 1; min-height: 0; overflow-y: auto; padding: 10px 5px; display: flex; flex-direction: column; gap: 24px;"></div>
      </div>
    </div>

  </template>


  <!-- ================================================================
       TEMPLATE : SETTINGS (Réglages & Profil — accès via le bouton profil)
       ================================================================ -->
  <template id="tpl-settings">
    <div class="app settings-app">
      <header class="settings-header">
        <button type="button" id="btn-settings-back" class="settings-back" aria-label="Retour à l'accueil">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <h1 class="settings-title">Réglages &amp; Profil</h1>
      </header>

      <!-- Profil -->
      <div style="margin-bottom:4px">
        <h2>Mon profil</h2>

        <div class="settings-row">
          <span class="settings-label">Prénom</span>
          <div style="display:flex;align-items:center;gap:8px">
            <span id="settings-name-val" style="font-size:14px;font-weight:600"></span>
            <input type="text" id="settings-name-input"
              style="display:none;width:130px;font-size:14px;padding:6px 10px"
              autocomplete="given-name">
            <button type="button" id="btn-settings-edit" class="btn-icon" aria-label="Modifier">
              <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            </button>
            <button type="button" id="btn-settings-save" class="btn-icon" style="display:none;color:var(--elle)" aria-label="Enregistrer">
              <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
            </button>
          </div>
        </div>

        <div class="toggle-row">
          <div>
            <div class="toggle-label">Je suis celle qui suit son cycle</div>
            <div class="toggle-sub">Définit qui est "Elle" dans les graphiques</div>
          </div>
          <label class="toggle">
            <input type="checkbox" id="settings-tracks">
            <span class="toggle-track"></span>
          </label>
        </div>
      </div>

      <!-- Sécurité : e-mail & mot de passe -->
      <div class="card">
        <h2>E-mail &amp; mot de passe</h2>
        <div class="field" style="margin-top:6px">
          <label for="settings-email">Adresse e-mail</label>
          <input type="email" id="settings-email" autocomplete="email" placeholder="ton@email.fr">
        </div>
        <button type="button" id="btn-set-email" class="btn-secondary" style="margin-top:8px">Changer l'e-mail</button>
        <div id="settings-email-msg" style="font-size:13px;margin-top:8px"></div>

        <p style="font-size:13px;color:var(--muted);margin:18px 0 12px;line-height:1.6">
          Définis ou change ton mot de passe (utile pour te connecter sur l'app installée).
        </p>
        <div class="field">
          <input type="password" id="settings-password" autocomplete="new-password"
            placeholder="Nouveau mot de passe (6 caractères min.)" minlength="6">
        </div>
        <button type="button" id="btn-set-password" class="btn-primary" style="margin-top:10px">Enregistrer le mot de passe</button>
        <div id="settings-password-msg" style="font-size:13px;margin-top:8px"></div>
      </div>

      <!-- Apparence -->
      <div class="card">
        <h2>Apparence</h2>
        <div class="toggle-row">
          <div>
            <div class="toggle-label">Mode sombre</div>
            <div class="toggle-sub">Thème foncé pour toute l'application</div>
          </div>
          <label class="toggle"><input type="checkbox" id="settings-dark-toggle"><span class="toggle-track"></span></label>
        </div>
      </div>

      <!-- Mode du cycle -->
      <div class="card">
        <h2>Objectif du suivi</h2>
        <div class="mode-tabs" id="mode-tabs">
          <button type="button" class="mode-tab active" data-mode="rules">🌀 Rythmes</button>
          <button type="button" class="mode-tab" data-mode="conception">🌱 Conception</button>
          <button type="button" class="mode-tab" data-mode="pregnancy">🤰 Grossesse</button>
        </div>
        <p id="mode-desc" style="font-size:13px;color:var(--muted);margin-top:12px;line-height:1.6"></p>
      </div>

      <!-- Contraception (adapte les conseils de phase) -->
      <div class="card" id="contraception-card">
        <h2>Contraception</h2>
        <p style="font-size:13px;color:var(--muted);margin:6px 0 12px;line-height:1.6">
          Adapte les « Conseils du jour » : un cycle bloqué hormonalement n'a pas de vrai pic d'ovulation.
        </p>
        <div class="field">
          <select id="settings-contraception" style="width:100%"></select>
        </div>
        <p id="contraception-desc" style="font-size:13px;color:var(--muted);margin-top:10px;line-height:1.6"></p>
      </div>

      <!-- Export & données -->
      <div class="card">
        <h2>Mes données</h2>
        <div class="settings-actions">
          <button type="button" id="btn-install"      class="btn-secondary" style="display:none">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:6px"><path d="M12 3v13M5 10l7 7 7-7"/><path d="M3 21h18"/></svg>
            Installer l'app (écran d'accueil)
          </button>
          <button type="button" id="btn-export-pdf"   class="btn-secondary">Exporter en PDF (bilan mensuel)</button>
          <button type="button" id="btn-export-json"  class="btn-secondary">Exporter en JSON</button>
          <button type="button" id="btn-export-csv"   class="btn-secondary">Exporter en CSV</button>
          <button type="button" id="btn-delete-data"  class="btn-secondary btn-danger">Supprimer toutes mes données</button>
          <button type="button" id="btn-reset-demo"   class="btn-secondary" style="display:none">Réinitialiser les données de démo</button>
        </div>
      </div>

      <!-- Réinitialiser les réglages intimes (cadre) -->
      <div class="card">
        <h2>Réglages intimes</h2>
        <p style="font-size:13px;color:var(--muted);margin:6px 0 12px;line-height:1.6">
          Remet à zéro ton <strong>cadre</strong> : safewords, limites et préférences d'aftercare.
          Tes moments, désirs et statistiques ne sont pas touchés.
        </p>
        <div class="settings-actions">
          <button type="button" id="btn-reset-cadre" class="btn-secondary btn-danger">Réinitialiser le cadre intime</button>
        </div>
      </div>

      <!-- Import Clue -->
      <div class="card">
        <h2>Importer mon historique</h2>
        <p style="font-size:13px;color:var(--muted);margin:6px 0 12px;line-height:1.6">
          Importe l'export <strong>Clue</strong> (measurements.json) ou <strong>LoveLust</strong> (.json) — le format est détecté automatiquement.
          Cycles, symptômes et activités intimes sont ajoutés à ton journal. Tes données restent privées (rien n'est partagé).
        </p>
        <input type="file" id="clue-file" accept=".json,application/json"
          style="display:block;width:100%;font-size:13px;margin-bottom:10px">
        <button type="button" id="btn-clue-import" class="btn-primary">Importer le fichier</button>
        <div id="clue-import-status" style="font-size:13px;margin-top:10px;line-height:1.5"></div>
      </div>

      <!-- Compte -->
      <div class="card">
        <h2>Compte</h2>
        <div class="settings-actions">
          <button type="button" id="btn-unlink"       class="btn-secondary btn-danger">Se délier du couple</button>
          <button type="button" id="btn-nous-signout" class="btn-secondary">Se déconnecter</button>
        </div>
      </div>

      <!-- Paramètres notifications -->
      <div class="card">
        <h2>Rappels</h2>
        <div class="toggle-row">
          <div><div class="toggle-label">Rappel quotidien de saisie</div></div>
          <label class="toggle"><input type="checkbox" id="notif-toggle-daily"><span class="toggle-track"></span></label>
        </div>
        <div class="toggle-row">
          <div><div class="toggle-label">Alerte règles imminentes</div></div>
          <label class="toggle"><input type="checkbox" id="notif-toggle-rules"><span class="toggle-track"></span></label>
        </div>
        <div class="toggle-row">
          <div><div class="toggle-label">Fenêtre fertile (mode conception)</div></div>
          <label class="toggle"><input type="checkbox" id="notif-toggle-fertile"><span class="toggle-track"></span></label>
        </div>
        <div class="toggle-row">
          <div>
            <div class="toggle-label">Libidos alignées ❤️</div>
            <div class="toggle-sub">Notification douce quand vos deux libidos sont ≥ 4</div>
          </div>
          <label class="toggle"><input type="checkbox" id="notif-toggle-libido-aligned"><span class="toggle-track"></span></label>
        </div>
        <div class="settings-row">
          <span class="settings-label">Heure du rappel quotidien</span>
          <select id="notif-hour" class="hour-select">
            <option value="18">18h00</option>
            <option value="19">19h00</option>
            <option value="20" selected>20h00</option>
            <option value="21">21h00</option>
            <option value="22">22h00</option>
          </select>
        </div>
      </div>

      <!-- RGPD -->
      <div class="card" style="margin-top:12px">
        <h2>Confidentialité</h2>
        <div class="rgpd-block">
          <p>Vos données sont stockées uniquement dans votre espace Supabase personnel. Aucun partage avec des tiers, aucun analytics intrusif.</p>
          <p>Conformément au RGPD, vous pouvez exporter ou supprimer toutes vos données à tout moment via les boutons ci-dessus.</p>
          <p>Cette application <strong>n'est pas un dispositif médical</strong> et ne remplace pas l'avis d'un professionnel de santé.</p>
        </div>
      </div>

    </div>
  </template>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
