<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#F6F5FF">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Notre rythme">
  <title>Notre rythme</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>

  <!-- Mount point -->
  <div id="view"></div>

  <!-- Bannière opt-in notifications (affichée une seule fois après connexion) -->
  <div id="notif-banner" class="notif-banner">
    <span>Recevoir des rappels quotidiens ?</span>
    <div>
      <button type="button" id="btn-notif-yes">Oui</button>
      <button type="button" id="btn-notif-no">Non merci</button>
    </div>
  </div>

  <!-- Bottom navigation (masquée sur auth/pairing) -->
  <nav id="main-nav">
    <button type="button" data-nav="today" class="on">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
      Aujourd'hui
    </button>
    <button type="button" data-nav="calendar">
      <svg viewBox="0 0 24 24"><rect x="4" y="5" width="16" height="16" rx="2"/><path d="M4 10h16M9 3v4M15 3v4"/></svg>
      Calendrier
    </button>
    <button type="button" data-nav="nous">
      <svg viewBox="0 0 24 24"><circle cx="9" cy="9" r="3"/><circle cx="16" cy="11" r="2.5"/><path d="M4 19c0-3 2.5-5 5-5s5 2 5 5M14 19c0-2 1-3.5 2.5-3.5S19 17 19 19"/></svg>
      Nous
    </button>
    <button type="button" data-nav="intime">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      Intime
    </button>
  </nav>

  <!-- ================================================================
       TEMPLATE : ONBOARDING (4 étapes)
       ================================================================ -->
  <template id="tpl-onboarding">
    <div class="app onboard-app">

      <!-- Indicateur de progression -->
      <div class="onboard-dots">
        <span class="onboard-dot active"></span>
        <span class="onboard-dot"></span>
        <span class="onboard-dot"></span>
        <span class="onboard-dot"></span>
      </div>

      <!-- Étape 1 : Bienvenue -->
      <div class="onboard-step active" data-step="1">
        <div class="onboard-hero">🌸</div>
        <h1 class="onboard-title">Notre rythme</h1>
        <p class="onboard-desc">
          Suivez votre cycle ensemble, en couple.<br>
          Symétrique, privé, sans algorithmes.
        </p>
        <ul class="onboard-features">
          <li><span class="feat-icon" style="background:var(--elle-light);color:var(--elle)">📈</span>Double rythme synchronisé</li>
          <li><span class="feat-icon" style="background:var(--lui-light);color:var(--lui)">🔗</span>Données uniquement partagées entre vous</li>
          <li><span class="feat-icon" style="background:var(--violet-light);color:var(--violet)">🔒</span>Zéro partage avec des tiers</li>
        </ul>
        <button type="button" id="btn-onboard-1" class="btn-primary" style="margin-top:32px">Commencer →</button>
      </div>

      <!-- Étape 2 : Disclaimer -->
      <div class="onboard-step" data-step="2">
        <div class="onboard-hero" style="background:var(--red-light)">⚕️</div>
        <h1 class="onboard-title">Important</h1>
        <div class="disclaimer-box">
          <p>Cette application est un <strong>outil d'observation</strong>, pas un moyen de contraception.</p>
          <p style="margin-top:12px">Les prédictions sont indicatives et dépendent de la régularité de votre cycle. Consultez un professionnel de santé pour tout sujet médical.</p>
        </div>
        <button type="button" id="btn-onboard-2" class="btn-primary" style="margin-top:28px">J'ai compris et j'accepte</button>
      </div>

      <!-- Étape 3 : Mode du cycle -->
      <div class="onboard-step" data-step="3">
        <div class="onboard-hero">🎯</div>
        <h1 class="onboard-title">Votre objectif</h1>
        <p class="onboard-desc">Adaptez l'app à votre situation.</p>
        <div class="mode-choices">
          <button type="button" class="mode-choice active" data-mode="rules">
            <span class="mode-icon">🌀</span>
            <div>
              <div class="mode-title">Comprendre nos rythmes</div>
              <div class="mode-sub">Suivi du cycle, insights, synchronie</div>
            </div>
          </button>
          <button type="button" class="mode-choice" data-mode="conception">
            <span class="mode-icon">🌱</span>
            <div>
              <div class="mode-title">Préparer une grossesse</div>
              <div class="mode-sub">Fenêtre fertile mise en avant</div>
            </div>
          </button>
          <button type="button" class="mode-choice" data-mode="pregnancy">
            <span class="mode-icon">🤰</span>
            <div>
              <div class="mode-title">Suivi de grossesse</div>
              <div class="mode-sub">Semaine par semaine, sans prédiction de règles</div>
            </div>
          </button>
        </div>
        <button type="button" id="btn-onboard-3" class="btn-primary" style="margin-top:24px">Continuer →</button>
      </div>

      <!-- Étape 4 : Date des dernières règles -->
      <div class="onboard-step" data-step="4">
        <div class="onboard-hero">📅</div>
        <h1 class="onboard-title">Dernières règles</h1>
        <p class="onboard-desc">
          Pour lancer le calcul de cycle. Vous pourrez modifier cette date plus tard.
        </p>
        <div class="field" style="margin-top:24px">
          <label for="onboard-period-date">Date de début</label>
          <input type="date" id="onboard-period-date">
        </div>
        <button type="button" id="btn-onboard-4" class="btn-primary" style="margin-top:8px">Terminer →</button>
        <button type="button" id="btn-onboard-4-skip" class="btn-secondary" style="margin-top:10px">Je n'ai pas mes règles / passer</button>
      </div>

    </div>
  </template>

  <!-- ================================================================
       TEMPLATE : AUTH
       ================================================================ -->
  <template id="tpl-auth">
    <div class="app">
      <header>
        <div class="eyebrow">Bienvenue</div>
        <div class="phase">Notre rythme</div>
        <div class="date" id="today-date"></div>
      </header>

      <div class="card" style="margin-top:32px">
        <h2>Connexion</h2>
        <div id="auth-form">
          <div id="auth-demo-hint" class="auth-demo-hint">
            Mode démo actif — aucun e-mail ne sera envoyé.<br>
            Entrez n'importe quoi et appuyez sur Entrée.
          </div>
          <p style="color:var(--muted);font-size:14px;margin-bottom:20px;line-height:1.6">
            Entrez votre adresse e-mail pour recevoir un lien de connexion magique.
          </p>
          <div class="field">
            <label for="auth-email">Adresse e-mail</label>
            <input type="email" id="auth-email" autocomplete="email" placeholder="vous@exemple.com" inputmode="email">
          </div>
          <button id="auth-submit" class="btn-primary">Envoyer le lien</button>
        </div>
        <div id="auth-sent" style="display:none">
          <p style="font-size:15px;line-height:1.7;color:var(--text)">
            Lien envoyé à <strong id="auth-email-display" style="color:var(--gold)"></strong>.<br>
            Vérifiez votre boîte mail et cliquez sur le lien.
          </p>
          <button id="auth-resend" class="btn-secondary" style="margin-top:20px">Renvoyer le lien</button>
        </div>
      </div>

      <p class="disclaimer">
        Application privée · usage personnel uniquement<br>
        Aucune donnée partagée avec des tiers
      </p>
    </div>
  </template>

  <!-- ================================================================
       TEMPLATE : PAIRING
       ================================================================ -->
  <template id="tpl-pairing">
    <div class="app">
      <header>
        <div class="eyebrow">Première connexion</div>
        <div class="phase">Notre espace</div>
      </header>

      <!-- Choix initial -->
      <div id="pairing-choice" style="margin-top:28px">
        <button id="btn-create" class="btn-choice">
          Créer notre espace
          <span class="sub">Je suis le premier à m'inscrire — je génère le code d'invitation.</span>
        </button>
        <button id="btn-join" class="btn-choice" style="margin-top:12px">
          Rejoindre avec un code
          <span class="sub">Mon partenaire m'a envoyé un code à 6 caractères.</span>
        </button>
      </div>

      <!-- Formulaire création -->
      <div id="pairing-create" style="display:none">
        <div class="card">
          <h2>Créer notre espace</h2>
          <div class="field">
            <label for="create-name">Votre prénom</label>
            <input type="text" id="create-name" autocomplete="given-name" placeholder="ex. Juliette">
          </div>
          <div class="toggle-row">
            <div>
              <div class="toggle-label">Je suis celle qui a ses règles</div>
              <div class="toggle-sub">Active le suivi de cycle complet</div>
            </div>
            <label class="toggle">
              <input type="checkbox" id="create-tracks">
              <span class="toggle-track"></span>
            </label>
          </div>
          <button id="btn-create-submit" class="btn-primary" style="margin-top:20px">Créer notre espace</button>
          <button id="btn-create-back" class="btn-secondary" style="margin-top:10px">Retour</button>
        </div>
      </div>

      <!-- Code généré à partager -->
      <div id="pairing-code-display" style="display:none">
        <div class="card">
          <h2>Code d'invitation</h2>
          <div class="code-display" id="generated-code">------</div>
          <div class="code-actions">
            <button type="button" id="btn-copy-code" class="btn-code-action">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
              Copier
            </button>
            <button type="button" id="btn-share-code" class="btn-code-action">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8M16 6l-4-4-4 4M12 2v13"/></svg>
              Partager
            </button>
          </div>
          <p style="font-size:13px;color:var(--muted);line-height:1.6;text-align:center;margin-bottom:16px">
            Expire dans 24 heures · Votre partenaire le saisit sur son téléphone.
          </p>
          <button type="button" id="btn-renew-code" class="btn-secondary">Nouveau code</button>
          <button type="button" id="btn-done" class="btn-primary" style="margin-top:10px">Continuer sans attendre →</button>
        </div>
        <p class="disclaimer">
          Une fois votre partenaire rejoint, l'espace se synchronise automatiquement.
        </p>
      </div>

      <!-- Formulaire rejoindre -->
      <div id="pairing-join" style="display:none">
        <div class="card">
          <h2>Rejoindre avec un code</h2>
          <div class="field">
            <label for="join-code">Code à 6 caractères</label>
            <input type="text" id="join-code" maxlength="6" autocomplete="off" placeholder="ex. AB3K7P"
              style="text-transform:uppercase;letter-spacing:.2em;font-family:'DM Mono',monospace;font-size:20px">
          </div>
          <div class="field">
            <label for="join-name">Votre prénom</label>
            <input type="text" id="join-name" autocomplete="given-name" placeholder="ex. Lucas">
          </div>
          <div class="toggle-row">
            <div>
              <div class="toggle-label">Je suis celui·celle qui a ses règles</div>
              <div class="toggle-sub">Active le suivi de cycle complet</div>
            </div>
            <label class="toggle">
              <input type="checkbox" id="join-tracks">
              <span class="toggle-track"></span>
            </label>
          </div>
          <button id="btn-join-submit" class="btn-primary" style="margin-top:20px">Rejoindre</button>
          <button id="btn-join-back" class="btn-secondary" style="margin-top:10px">Retour</button>
        </div>
      </div>
    </div>
  </template>

  <!-- ================================================================
       TEMPLATE : TODAY (écran principal — maquette §6)
       ================================================================ -->
  <template id="tpl-today">
    <div class="app">
      <header>
        <div class="eyebrow" id="eyebrow">—</div>
        <div class="phase" id="phase-name">Notre rythme</div>
        <div class="date" id="today-date"></div>
        <span class="demo-badge">Mode démo · données locales</span>
        <span id="streak-badge" class="streak-badge" style="display:none"></span>
      </header>

      <!-- Contrôle cycle (visible uniquement pour elle) -->
      <div id="cycle-controls" style="margin-top:16px;display:none">
        <button type="button" id="btn-cycle-toggle" class="btn-primary">Mes règles commencent</button>
      </div>

      <!-- Qui saisit ? + Comme hier -->
      <div class="who-row">
        <div class="who" id="who-toggle" role="tablist">
          <button type="button" data-p="elle">Elle</button>
          <button type="button" data-p="lui">Lui</button>
        </div>
        <button type="button" id="btn-comme-hier" class="btn-comme-hier" title="Copier la saisie d'hier">
          <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
          Comme hier
        </button>
      </div>

      <!-- Double rythme -->
      <div class="card rhythm">
        <h2>Notre rythme · ce cycle</h2>
        <svg id="chart" viewBox="0 0 340 148" preserveAspectRatio="none"
          aria-label="Courbes superposées des deux partenaires sur le cycle"></svg>
        <div class="legend">
          <span><i class="dot g"></i>Elle</span>
          <span><i class="dot s"></i>Lui</span>
        </div>
      </div>

      <!-- Saisie du jour -->
      <div class="card">
        <!-- Navigation date (saisie antérieure) -->
        <div class="log-date-nav">
          <button type="button" id="btn-log-prev" class="log-nav-btn" aria-label="Jour précédent">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>
          </button>
          <span id="log-date-label" class="log-date-label">Aujourd'hui</span>
          <button type="button" id="btn-log-next" class="log-nav-btn" aria-label="Jour suivant" disabled>
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg>
          </button>
        </div>
        <h2 id="log-title">Elle</h2>
        <div id="metrics">
          <!-- État vide initial (remplacé par renderMetrics) -->
          <div class="empty-state-inline">
            <div class="es-icon">✏️</div>
            <p>Chargement des données…</p>
          </div>
        </div>
      </div>

      <!-- Insight -->
      <div class="card insight">
        <h2>Cette semaine</h2>
        <div class="body" id="insight-body"></div>
        <div class="meta" id="insight-meta">Données en cours d'accumulation</div>
      </div>

      <!-- Conseil (lui) -->
      <div class="card tip" id="tip-card" style="display:none">
        <h2>Pour toi</h2>
        <p id="tip-text"></p>
      </div>

      <!-- Prédiction (≥ 2 cycles) -->
      <div class="card" id="prediction-card" style="display:none">
        <h2>Prochainement</h2>
        <div class="pred-row">
          <div class="pred-item">
            <div class="pred-label">Règles</div>
            <div class="pred-val" style="color:var(--rose)" id="pred-next">—</div>
            <div class="pred-sub" id="pred-next-date"></div>
          </div>
          <div class="pred-item">
            <div class="pred-label">Ovulation</div>
            <div class="pred-val" style="color:var(--gold)" id="pred-ovulation">—</div>
          </div>
          <div class="pred-item">
            <div class="pred-label">Cycle moy.</div>
            <div class="pred-val" id="pred-avg">—</div>
          </div>
        </div>
        <div class="pred-disclaimer">Indicatif · pas un outil contraceptif</div>
      </div>

      <!-- Moments partagés -->
      <div class="card">
        <h2>Nos moments</h2>
        <div id="events-list"></div>
        <button class="addev" id="btn-addev">+ Noter un moment</button>
      </div>

      <!-- Disclaimer -->
      <p class="disclaimer" style="margin-bottom:16px">
        Ce n'est pas un moyen de contraception.<br>
        Les prédictions sont indicatives uniquement.
      </p>
    </div>

    <!-- Sheet : noter un moment -->
    <div id="event-sheet" class="sheet-backdrop">
      <div class="sheet">
        <div class="sheet-handle"></div>
        <h3 class="sheet-title">Noter un moment</h3>
        <div class="ev-types">
          <button class="ev-type-btn" data-type="intimacy">❤️<span>Intimité</span></button>
          <button class="ev-type-btn" data-type="date_night">🌙<span>Soirée</span></button>
          <button class="ev-type-btn" data-type="conflict">💬<span>Tension</span></button>
          <button class="ev-type-btn" data-type="other">✨<span>Autre</span></button>
        </div>
        <div class="field" style="margin-top:18px">
          <label for="event-note">Note (optionnel)</label>
          <input type="text" id="event-note" placeholder="ex. Belle soirée ensemble…">
        </div>
        <button id="btn-sheet-save" class="btn-primary">Enregistrer</button>
        <button id="btn-sheet-cancel" class="btn-secondary" style="margin-top:10px">Annuler</button>
      </div>
    </div>
  </template>

  <!-- ================================================================
       TEMPLATE : CALENDAR
       ================================================================ -->
  <template id="tpl-calendar">
    <div class="app">
      <header>
        <div class="eyebrow">Vue du cycle</div>
        <div class="phase">Calendrier</div>
        <div class="date" id="today-date"></div>
      </header>

      <!-- Navigation mois -->
      <div class="cal-nav">
        <button id="cal-prev" class="cal-nav-btn" aria-label="Mois précédent">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <span id="cal-month-title" style="font-family:'DM Mono',monospace;font-size:13px;letter-spacing:.1em"></span>
        <button id="cal-next" class="cal-nav-btn" aria-label="Mois suivant">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
        </button>
      </div>

      <!-- Grille jours -->
      <div id="cal-grid" class="cal-grid"></div>

      <!-- Légende -->
      <div class="cal-legend">
        <span><i class="cal-legend-dot" style="background:#E53935"></i>Règles</span>
        <span><i class="cal-legend-dot" style="background:#7C5CFC"></i>Ovulation</span>
        <span><i class="cal-legend-dot" style="background:#E84375"></i>Lutéale</span>
        <span><i class="cal-legend-dot" style="border:1.5px dashed var(--faint);background:transparent"></i>Prévu</span>
      </div>

      <!-- Prédiction -->
      <div class="card" style="margin-top:16px">
        <h2>Prédiction</h2>
        <div id="cal-prediction"></div>
      </div>

      <!-- Historique cycles -->
      <div class="card">
        <h2>Historique</h2>
        <div id="cal-history"></div>
      </div>

      <p class="disclaimer">Indicatif · pas un outil contraceptif</p>
    </div>

    <!-- Sheet : détail d'un jour -->
    <div id="day-detail" class="sheet-backdrop">
      <div class="sheet">
        <div class="sheet-handle"></div>
        <h3 class="sheet-title" id="day-detail-date"></h3>
        <div id="day-detail-body"></div>
        <button id="btn-detail-close" class="btn-secondary" style="margin-top:20px">Fermer</button>
      </div>
    </div>
  </template>

  <!-- ================================================================
       TEMPLATE : NOUS (corrélations + réglages)
       ================================================================ -->
  <template id="tpl-nous">
    <div class="app">
      <header>
        <div class="eyebrow">Analyse · 90 jours</div>
        <div class="phase">Nous</div>
        <div class="date" id="today-date"></div>
      </header>

      <!-- Score synchronie -->
      <div class="card" style="margin-top:20px" id="sync-card">
        <h2>Synchronie du couple</h2>
        <div id="sync-score"></div>
      </div>

      <!-- Stats de la semaine -->
      <div class="card">
        <h2>Cette semaine</h2>
        <div id="nous-week"></div>
      </div>

      <!-- Tendances 7 jours -->
      <div class="card">
        <h2>Tendances · 7 jours</h2>
        <div id="nous-trends"></div>
      </div>

      <!-- Tendances 3 mois (sparklines) -->
      <div class="card">
        <h2>Énergie · 12 semaines</h2>
        <div id="nous-weekly-chart"></div>
      </div>

      <!-- Corrélations (§9) -->
      <div class="card">
        <h2>Corrélations · 90 jours</h2>
        <p style="font-size:12px;color:var(--faint);font-family:'DM Mono',monospace;letter-spacing:.04em;margin-bottom:16px;line-height:1.6">
          Coefficient de Pearson sur les jours où vous avez tous les deux saisi.
        </p>
        <div id="nous-correlations"></div>
      </div>

      <!-- Répartition moments par phase -->
      <div class="card">
        <h2>Vos moments · par phase</h2>
        <div id="events-by-phase"></div>
      </div>

      <!-- Heatmap conflits -->
      <div class="card">
        <h2>Tensions · par phase</h2>
        <div id="conflict-heatmap"></div>
      </div>

      <!-- Anomalies cycle -->
      <div class="card">
        <h2>Analyse du cycle</h2>
        <div id="cycle-anomalies"></div>
      </div>

      <!-- Réglages profil -->
      <div class="card">
        <h2>Mon profil</h2>

        <div class="settings-row">
          <span class="settings-label">Prénom</span>
          <div style="display:flex;align-items:center;gap:8px">
            <span id="settings-name-val" style="font-size:14px;font-weight:600"></span>
            <input type="text" id="settings-name-input"
              style="display:none;width:130px;font-size:14px;padding:6px 10px"
              autocomplete="given-name">
            <button type="button" id="btn-settings-edit" class="btn-icon" aria-label="Modifier">
              <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            </button>
            <button type="button" id="btn-settings-save" class="btn-icon" style="display:none;color:var(--elle)" aria-label="Enregistrer">
              <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
            </button>
          </div>
        </div>

        <div class="toggle-row">
          <div>
            <div class="toggle-label">Je suis celle qui suit son cycle</div>
            <div class="toggle-sub">Définit qui est "Elle" dans les graphiques</div>
          </div>
          <label class="toggle">
            <input type="checkbox" id="settings-tracks">
            <span class="toggle-track"></span>
          </label>
        </div>
      </div>

      <!-- Mode du cycle -->
      <div class="card">
        <h2>Objectif du suivi</h2>
        <div class="mode-tabs" id="mode-tabs">
          <button type="button" class="mode-tab active" data-mode="rules">🌀 Rythmes</button>
          <button type="button" class="mode-tab" data-mode="conception">🌱 Conception</button>
          <button type="button" class="mode-tab" data-mode="pregnancy">🤰 Grossesse</button>
        </div>
        <p id="mode-desc" style="font-size:13px;color:var(--muted);margin-top:12px;line-height:1.6"></p>
      </div>

      <!-- Export & données -->
      <div class="card">
        <h2>Mes données</h2>
        <div class="settings-actions">
          <button type="button" id="btn-install"      class="btn-secondary" style="display:none">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:6px"><path d="M12 3v13M5 10l7 7 7-7"/><path d="M3 21h18"/></svg>
            Installer l'app (écran d'accueil)
          </button>
          <button type="button" id="btn-export-pdf"   class="btn-secondary">Exporter en PDF (bilan mensuel)</button>
          <button type="button" id="btn-export-json"  class="btn-secondary">Exporter en JSON</button>
          <button type="button" id="btn-export-csv"   class="btn-secondary">Exporter en CSV</button>
          <button type="button" id="btn-delete-data"  class="btn-secondary btn-danger">Supprimer toutes mes données</button>
          <button type="button" id="btn-reset-demo"   class="btn-secondary" style="display:none">Réinitialiser les données de démo</button>
        </div>
      </div>

      <!-- Compte -->
      <div class="card">
        <h2>Compte</h2>
        <div class="settings-actions">
          <button type="button" id="btn-unlink"       class="btn-secondary btn-danger">Se délier du couple</button>
          <button type="button" id="btn-nous-signout" class="btn-secondary">Se déconnecter</button>
        </div>
      </div>

      <!-- Paramètres notifications -->
      <div class="card">
        <h2>Rappels</h2>
        <div class="toggle-row">
          <div><div class="toggle-label">Rappel quotidien de saisie</div></div>
          <label class="toggle"><input type="checkbox" id="notif-toggle-daily"><span class="toggle-track"></span></label>
        </div>
        <div class="toggle-row">
          <div><div class="toggle-label">Alerte règles imminentes</div></div>
          <label class="toggle"><input type="checkbox" id="notif-toggle-rules"><span class="toggle-track"></span></label>
        </div>
        <div class="toggle-row">
          <div><div class="toggle-label">Fenêtre fertile (mode conception)</div></div>
          <label class="toggle"><input type="checkbox" id="notif-toggle-fertile"><span class="toggle-track"></span></label>
        </div>
        <div class="settings-row">
          <span class="settings-label">Heure du rappel quotidien</span>
          <select id="notif-hour" class="hour-select">
            <option value="18">18h00</option>
            <option value="19">19h00</option>
            <option value="20" selected>20h00</option>
            <option value="21">21h00</option>
            <option value="22">22h00</option>
          </select>
        </div>
      </div>

      <!-- RGPD -->
      <div class="card">
        <h2>Confidentialité</h2>
        <div class="rgpd-block">
          <p>Vos données sont stockées uniquement dans votre espace Supabase personnel. Aucun partage avec des tiers, aucun analytics intrusif.</p>
          <p>Conformément au RGPD, vous pouvez exporter ou supprimer toutes vos données à tout moment via les boutons ci-dessus.</p>
          <p>Cette application <strong>n'est pas un dispositif médical</strong> et ne remplace pas l'avis d'un professionnel de santé.</p>
        </div>
      </div>

      <p class="disclaimer">
        Ce n'est pas un outil contraceptif.<br>
        Les corrélations sont statistiques, pas causales.
      </p>
    </div>
  </template>

  <!-- ================================================================
       TEMPLATE : INTIME
       Sections : Moments · Désirs & Kinks · Santé · Limites & Consentement
       ================================================================ -->
  <template id="tpl-intime">
    <div class="app">
      <header>
        <div class="eyebrow" style="color:var(--elle)">Espace intime</div>
        <div class="phase">Intime</div>
        <div class="date" id="today-date-intime"></div>
      </header>

      <!-- Fenêtre de désir -->
      <div id="desire-window" style="margin-top:16px"></div>

      <!-- Quick add -->
      <button type="button" id="btn-quick-add" class="btn-quick-add">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        On a partagé un moment ?
      </button>

      <!-- Équilibre + délai neutre -->
      <div class="intime-meta">
        <span id="days-since" class="meta-chip" style="display:none"></span>
        <span id="initiation-balance" class="meta-chip" style="display:none"></span>
      </div>

      <!-- Souvenir du jour -->
      <div id="souvenir-du-jour" style="display:none;margin-top:14px"></div>

      <!-- Débrief post-dispute -->
      <div id="debrief-postdispute" style="display:none;margin-top:14px"></div>

      <!-- Sessions récentes -->
      <div class="card">
        <h2>Nos moments récents</h2>
        <div id="recent-sessions"></div>
      </div>

      <!-- Équité du plaisir -->
      <div class="card">
        <h2>Satisfaction & plaisir partagé</h2>
        <div id="equite-plaisir"></div>
      </div>

      <!-- Croisement cycle × intimité -->
      <div class="card">
        <h2>Intimité selon la phase du cycle</h2>
        <div id="cycle-x-intimite"></div>
      </div>

      <!-- Alignement libido par phase (dans kinks.js) -->
      <div class="card">
        <h2>Libido Elle · par phase</h2>
        <div id="libido-par-phase"></div>
      </div>

      <!-- Désirs en commun (matchs) -->
      <div class="card">
        <h2>Désirs en commun</h2>
        <div id="match-counter" class="match-counter-label"></div>
        <div id="kink-matches" style="margin-top:12px"></div>
        <button type="button" class="btn-secondary" style="margin-top:14px"
          onclick="document.getElementById('kinks-section').scrollIntoView({behavior:'smooth'})">
          Explorer tous les désirs →
        </button>
      </div>

      <!-- Explorer les kinks (vue privée + slider) -->
      <div class="card" id="kinks-section">
        <h2>Mes désirs — privé</h2>
        <p style="font-size:12px;color:var(--faint);font-family:'DM Mono',monospace;line-height:1.6;margin-bottom:14px">
          Tes réponses restent privées. Ton partenaire sait seulement que tu t'y intéresses (pas le niveau). Un match apparaît quand vous êtes deux à avoir répondu.
        </p>
        <div id="kink-list"></div>
      </div>

      <!-- Check-in pratiques validées -->
      <div id="checkin-validated" style="display:none;margin-top:14px"></div>

      <!-- Wish-list -->
      <div class="card">
        <h2>Notre wish-list</h2>
        <div id="wishlist"></div>
        <button type="button" id="btn-add-wish" class="btn-secondary" style="margin-top:12px">+ Ajouter une idée</button>
      </div>

      <!-- Premières fois -->
      <div class="card">
        <h2>Nos premières fois</h2>
        <div id="first-times-list"></div>
        <button type="button" id="btn-add-first" class="btn-secondary" style="margin-top:12px">+ Ajouter une première</button>
      </div>

      <!-- Défis du mois -->
      <div class="card">
        <h2>Défis du mois</h2>
        <div id="challenges-list"></div>
      </div>

      <!-- Aftercare préférences (local, très privé) -->
      <div class="card">
        <h2>Mes préférences d'aftercare — privé</h2>
        <p style="font-size:12px;color:var(--faint);font-family:'DM Mono',monospace;margin-bottom:12px;line-height:1.6">
          Stocké uniquement sur cet appareil. Non partagé.
        </p>
        <div id="aftercare-prefs">
          <textarea id="aftercare-input" class="note-input" rows="3"
            placeholder="Ex. : câlins, silence, verre d'eau, musique douce…"></textarea>
        </div>
      </div>

      <!-- Santé (privé par défaut) -->
      <div class="card">
        <h2>Santé — privé par défaut</h2>
        <div id="health-summary"></div>
        <button type="button" id="btn-add-health" class="btn-secondary" style="margin-top:12px">+ Ajouter une entrée</button>
      </div>

      <!-- Limites & Consentement -->
      <div class="card" style="border-color:rgba(124,92,252,.25)">
        <h2 style="color:var(--violet)">Mes limites</h2>
        <p style="font-size:12px;color:var(--faint);font-family:'DM Mono',monospace;margin-bottom:14px;line-height:1.6">
          Les hard limits sont toujours visibles de votre partenaire — c'est leur but.
        </p>
        <div id="my-limits"></div>
        <button type="button" id="btn-add-limit" class="btn-secondary" style="margin-top:12px">+ Poser une limite</button>
      </div>

      <!-- Hard limits du couple (toujours visibles) -->
      <div class="card">
        <h2>Hard limits du couple</h2>
        <div id="hard-limits-display"></div>
      </div>

      <!-- Safewords -->
      <div class="card">
        <h2>Safewords</h2>
        <div id="safewords-display"></div>
      </div>

      <p class="disclaimer">
        Ces données sont très sensibles. Elles sont chiffrées en transit (HTTPS) et protégées par RLS. Aucune galerie photo n'est stockée dans le cloud. En cas de séparation, utilisez "Supprimer mes données" dans Nous.
      </p>
    </div>

    <!-- Sheet : logger une session -->
    <div id="session-sheet" class="sheet-backdrop">
      <div class="sheet">
        <div class="sheet-handle"></div>
        <h3 class="sheet-title">Notre moment</h3>

        <div class="field">
          <label for="session-date-input">Date</label>
          <input type="date" id="session-date-input">
        </div>

        <div class="field">
          <label>Ambiance</label>
          <div class="mood-grid">
            <button type="button" class="mood-btn" data-mood="tender">🥰<span>Tendre</span></button>
            <button type="button" class="mood-btn" data-mood="playful">😄<span>Joueur</span></button>
            <button type="button" class="mood-btn" data-mood="passionate">🔥<span>Passionné</span></button>
            <button type="button" class="mood-btn" data-mood="spontaneous">⚡<span>Spontané</span></button>
          </div>
        </div>

        <div class="field">
          <label>Lieu</label>
          <div class="loc-grid">
            <button type="button" class="loc-btn" data-loc="maison">🏠 Maison</button>
            <button type="button" class="loc-btn" data-loc="voyage">✈️ Voyage</button>
            <button type="button" class="loc-btn" data-loc="hotel">🏨 Hôtel</button>
            <button type="button" class="loc-btn" data-loc="autre">📍 Autre</button>
          </div>
        </div>

        <div class="field">
          <label>Type d'activité (multi-sélection)</label>
          <div class="act-tags-grid">
            <button type="button" class="act-tag-btn" data-tag="massage">💆 Massage</button>
            <button type="button" class="act-tag-btn" data-tag="oral">💋 Câlins buccaux</button>
            <button type="button" class="act-tag-btn" data-tag="toys">🎯 Accessoires</button>
            <button type="button" class="act-tag-btn" data-tag="roleplay">🎭 Jeu de rôles</button>
            <button type="button" class="act-tag-btn" data-tag="bondage_soft">🎀 Contrainte douce</button>
            <button type="button" class="act-tag-btn" data-tag="slow">🕯️ Ralenti</button>
          </div>
        </div>

        <div style="display:flex;gap:12px">
          <div class="field" style="flex:1">
            <label for="session-duration">Durée (min)</label>
            <input type="number" id="session-duration" min="1" max="300" placeholder="30" style="padding:10px 12px">
          </div>
        </div>

        <div class="field">
          <label for="session-note-input">Note partagée (optionnel)</label>
          <input type="text" id="session-note-input" placeholder="Ce qu'on a adoré…">
        </div>

        <button type="button" id="btn-session-save" class="btn-primary">Enregistrer → Feedback rapide</button>
        <button type="button" id="btn-session-cancel" class="btn-secondary" style="margin-top:10px">Annuler</button>
      </div>
    </div>

    <!-- Sheet : feedback post-séance (4 questions ~30s) -->
    <div id="feedback-sheet" class="sheet-backdrop">
      <div class="sheet">
        <div class="sheet-handle"></div>
        <h3 class="sheet-title">Note ta séance 🔥</h3>
        <p style="font-size:13px;color:var(--muted);margin-bottom:18px">Privé par défaut. ~30 secondes.</p>

        <div class="field">
          <label>Ma satisfaction</label>
          <div class="fb-sat-grid">
            <button type="button" class="fb-sat-btn" data-sat="2">😔</button>
            <button type="button" class="fb-sat-btn" data-sat="4">😐</button>
            <button type="button" class="fb-sat-btn" data-sat="6">🙂</button>
            <button type="button" class="fb-sat-btn" data-sat="8">😊</button>
            <button type="button" class="fb-sat-btn" data-sat="10">🤩</button>
          </div>
        </div>

        <div class="toggle-row">
          <div><div class="toggle-label">Orgasme ?</div></div>
          <label class="toggle">
            <input type="checkbox" id="fb-orgasm">
            <span class="toggle-track"></span>
          </label>
        </div>

        <div class="field" style="margin-top:14px">
          <label for="fb-loved">Ce que j'ai aimé</label>
          <input type="text" id="fb-loved" placeholder="La tendresse, le rythme…">
        </div>

        <div class="field">
          <label for="fb-improve">Ce qu'on pourrait améliorer</label>
          <input type="text" id="fb-improve" placeholder="Plus de temps, plus de...">
        </div>

        <button type="button" id="btn-feedback-save" class="btn-primary">Enregistrer</button>
        <button type="button" id="btn-feedback-skip" class="btn-secondary" style="margin-top:10px">Passer</button>
      </div>
    </div>
  </template>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
